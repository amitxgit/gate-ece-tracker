<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE ECE — Syllabus Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F1F3EE;
  --paper-raised:#FFFFFF;
  --grid-line:#E2E7DE;
  --ink:#182019;
  --muted:#6D766D;
  --muted-2:#9AA096;
  --line:#DBDFD5;
  --copper:#B5651D;
  --copper-dark:#8A4E16;
  --copper-soft:#F2E2CE;
  --green:#2E6B4F;
  --green-dark:#1F4E39;
  --green-soft:#DCEAE1;
  --scope-bg:#0F1E18;
  --scope-grid:#1D3A2C;
  --scope-trace:#5FDBA3;
  --radius:10px;
  --shadow:0 1px 2px rgba(24,32,25,.06), 0 4px 14px rgba(24,32,25,.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background-color:var(--paper);
  background-image:radial-gradient(circle, var(--grid-line) 1px, transparent 1px);
  background-size:22px 22px;
  color:var(--ink);
  font-family:'IBM Plex Sans', system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important; transition:none !important;}
}
h1,h2,h3{font-family:'Space Grotesk', sans-serif; margin:0;}
.mono{font-family:'IBM Plex Mono', monospace;}
button{font-family:inherit;}
input,textarea{font-family:inherit;}
:focus-visible{outline:2px solid var(--copper-dark); outline-offset:2px;}

#loadingScreen{
  position:fixed; inset:0; background:var(--paper); display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono', monospace; color:var(--muted); font-size:13px; letter-spacing:.04em; z-index:50;
}

.app{max-width:760px; margin:0 auto; padding:0 18px 60px;}

/* ---------- Topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:16px 0 12px;
  background:linear-gradient(var(--paper) 78%, transparent);
  backdrop-filter:blur(2px);
}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600; letter-spacing:.08em;
  color:var(--paper-raised); background:var(--ink); padding:4px 7px; border-radius:5px;
}
.brand h1{font-size:19px; font-weight:600; line-height:1.1;}
.brand .tagline{margin:2px 0 0; font-size:12px; color:var(--muted);}

.countdown-wrap{position:relative;}
.countdown{
  display:flex; align-items:baseline; gap:5px; background:var(--paper-raised); border:1px solid var(--line);
  border-radius:20px; padding:7px 12px; cursor:pointer; box-shadow:var(--shadow);
}
.countdown-num{font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px; color:var(--copper-dark);}
.countdown-unit{font-size:11px; color:var(--muted);}
.countdown-input{
  display:none; position:absolute; right:0; top:0; z-index:2;
  padding:7px 10px; border-radius:20px; border:1px solid var(--copper); font-size:13px;
  font-family:'IBM Plex Mono', monospace; background:var(--paper-raised); color:var(--ink);
}
.countdown-wrap.editing .countdown{display:none;}
.countdown-wrap.editing .countdown-input{display:block;}

/* ---------- Tabs ---------- */
.tabs{display:flex; gap:4px; padding:2px 0 18px; border-bottom:1px solid var(--line);}
.tab{
  background:none; border:none; padding:9px 4px; margin-right:14px; font-size:13.5px; font-weight:500;
  color:var(--muted); cursor:pointer; position:relative; letter-spacing:.01em;
}
.tab::after{
  content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--copper);
  transform:scaleX(0); transition:transform .2s ease;
}
.tab.active{color:var(--ink);}
.tab.active::after{transform:scaleX(1);}

.panel{display:none;}
.panel.active{display:block; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Hero ---------- */
.hero{
  display:flex; align-items:center; gap:20px; padding:22px 0 18px;
}
.hero-num{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:clamp(40px,10vw,56px); line-height:1; color:var(--ink); display:flex; align-items:flex-start;}
.hero-num .unit{font-size:20px; margin-top:6px; margin-left:2px; color:var(--muted);}
.hero-meta{flex:1; min-width:0;}
.hero-stat{font-size:13.5px; color:var(--muted); margin-bottom:9px;}
.hero-stat strong{color:var(--ink); font-family:'IBM Plex Mono', monospace; font-weight:600;}

.trace-bar{display:flex; gap:4px;}
.trace-seg{
  flex:1; height:9px; background:var(--paper-raised); border:1px solid var(--line); border-radius:3px;
  overflow:hidden; cursor:default;
}
.trace-fill{height:100%; background:linear-gradient(90deg, var(--copper), var(--green)); width:0%; transition:width .3s ease;}

/* ---------- Search ---------- */
.search-row{margin-bottom:14px;}
#searchInput{
  width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:var(--radius);
  background:var(--paper-raised); font-size:13.5px; color:var(--ink);
}
#searchInput::placeholder{color:var(--muted-2);}
.no-match{padding:26px 4px; text-align:center; color:var(--muted); font-size:13.5px;}

/* ---------- Section cards ---------- */
.section-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden;
}
.section-head{
  width:100%; display:flex; align-items:center; gap:10px; padding:13px 14px; background:none; border:none;
  cursor:pointer; text-align:left;
}
.section-num{
  font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted-2); flex-shrink:0; width:20px;
}
.section-title{font-size:14px; font-weight:600; flex-shrink:0; margin-right:2px;}
.pad-row{display:flex; flex-wrap:wrap; gap:3px; flex:1; min-width:60px;}
.pad{width:9px; height:9px; border:1.4px solid var(--copper); border-radius:2px; flex-shrink:0; background:transparent;}
.pad.done{background:var(--green); border-color:var(--green);}
.section-pct{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); flex-shrink:0;}
.chevron{width:14px; height:14px; flex-shrink:0; color:var(--muted-2); transition:transform .2s ease;}
.section-card.expanded .chevron{transform:rotate(180deg);}

.section-body{display:grid; grid-template-rows:0fr; transition:grid-template-rows .22s ease;}
.section-card.expanded .section-body{grid-template-rows:1fr;}
.section-body-inner{overflow:hidden; min-height:0;}
.topics{padding:2px 14px 12px; border-top:1px solid var(--grid-line);}
.topic-row{display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--grid-line); cursor:pointer;}
.topic-row:last-child{border-bottom:none;}
.topic-row.hidden{display:none;}
input[type=checkbox].topic-check{
  appearance:none; -webkit-appearance:none; width:17px; height:17px; border:1.5px solid var(--copper);
  border-radius:4px; position:relative; cursor:pointer; flex-shrink:0; margin-top:1px; background:var(--paper-raised);
  transition:background .15s, border-color .15s;
}
input[type=checkbox].topic-check:checked{background:var(--green); border-color:var(--green);}
input[type=checkbox].topic-check:checked::after{
  content:''; position:absolute; left:5px; top:2px; width:4px; height:8px;
  border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
}
.topic-text strong{display:block; font-size:13.5px; font-weight:500;}
.topic-text small{display:block; font-size:12px; color:var(--muted); margin-top:1px; line-height:1.4;}
mark{background:var(--copper-soft); color:inherit; border-radius:2px;}

/* ---------- PYQ tab ---------- */
.pyq-row{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:13px 14px; margin-bottom:9px; box-shadow:var(--shadow);
}
.pyq-row-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px;}
.pyq-row-head .t{font-size:13.5px; font-weight:600;}
.pyq-row-head .p{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--copper-dark);}
.pyq-inputs{display:flex; gap:10px; margin-bottom:9px;}
.pyq-inputs label{flex:1; font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:4px;}
.pyq-inputs input{
  padding:7px 9px; border:1px solid var(--line); border-radius:6px; font-size:13px;
  font-family:'IBM Plex Mono', monospace; width:100%;
}
.pyq-bar{height:6px; background:var(--paper); border-radius:3px; overflow:hidden;}
.pyq-bar-fill{height:100%; background:var(--copper); border-radius:3px; transition:width .25s ease;}

/* ---------- Mock tests ---------- */
.mock-stats{display:flex; gap:10px; margin:18px 0 14px;}
.stat-card{flex:1; background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow);}
.stat-card .v{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px;}
.stat-card .l{font-size:11px; color:var(--muted); margin-top:2px;}

.scope-wrap{
  background:var(--scope-bg); border-radius:var(--radius); padding:12px 6px 4px; margin-bottom:16px;
  box-shadow:var(--shadow);
}
.scope-wrap svg{width:100%; height:180px; display:block;}
.scope-grid-line{stroke:var(--scope-grid); stroke-width:1;}
.scope-axis-label{fill:#5A7A6A; font-family:'IBM Plex Mono', monospace; font-size:9px;}
.scope-line{fill:none; stroke:var(--scope-trace); stroke-width:2; stroke-linejoin:round; stroke-linecap:round;}
.scope-dot{fill:var(--scope-trace); stroke:var(--scope-bg); stroke-width:1.5;}
.scope-empty{fill:#5A7A6A; font-family:'IBM Plex Mono', monospace; font-size:12px;}

.add-mock-btn{
  width:100%; padding:11px; border:1.5px dashed var(--copper); border-radius:var(--radius); background:none;
  color:var(--copper-dark); font-size:13.5px; font-weight:500; cursor:pointer; margin-bottom:14px;
}
.mock-form{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:16px;
  margin-bottom:16px; box-shadow:var(--shadow);
}
.mock-form .row{display:flex; gap:10px; margin-bottom:10px;}
.mock-form .field{flex:1; display:flex; flex-direction:column; gap:5px;}
.mock-form label{font-size:11px; color:var(--muted);}
.mock-form input, .mock-form textarea{
  padding:9px 10px; border:1px solid var(--line); border-radius:6px; font-size:13.5px; width:100%; color:var(--ink);
}
.mock-form textarea{resize:vertical; min-height:44px;}
.mock-form .actions{display:flex; gap:8px; margin-top:4px;}
.btn-primary{background:var(--ink); color:var(--paper-raised); border:none; padding:9px 16px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer;}
.btn-ghost{background:none; border:1px solid var(--line); padding:9px 16px; border-radius:7px; font-size:13px; cursor:pointer; color:var(--muted);}

.mock-item{
  display:flex; align-items:flex-start; gap:12px; background:var(--paper-raised); border:1px solid var(--line);
  border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; box-shadow:var(--shadow);
}
.mock-score{
  font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:15px; color:var(--paper-raised);
  background:var(--green); border-radius:7px; padding:6px 9px; flex-shrink:0; min-width:44px; text-align:center;
}
.mock-score.low{background:var(--copper);}
.mock-body{flex:1; min-width:0;}
.mock-title{font-size:13.5px; font-weight:600;}
.mock-date{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); margin-top:1px;}
.mock-remarks{font-size:12px; color:var(--muted); margin-top:5px; line-height:1.4;}
.mock-del{background:none; border:none; color:var(--muted-2); cursor:pointer; font-size:16px; line-height:1; padding:2px 4px; flex-shrink:0;}
.mock-del:hover{color:var(--copper-dark);}
.mock-empty{text-align:center; color:var(--muted); font-size:13px; padding:16px 0;}

/* ---------- Footer ---------- */
footer{
  display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:26px; padding-top:16px;
  border-top:1px solid var(--line); flex-wrap:wrap;
}
.footer-actions{display:flex; gap:8px;}
.footer-btn{
  background:none; border:1px solid var(--line); border-radius:7px; padding:7px 12px; font-size:12px;
  color:var(--muted); cursor:pointer;
}
.footer-btn:hover{color:var(--ink); border-color:var(--copper);}
.footnote{font-size:11px; color:var(--muted-2);}

.toast{
  position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(10px); opacity:0;
  background:var(--ink); color:var(--paper-raised); font-size:12.5px; padding:9px 16px; border-radius:20px;
  pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:40;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.auth-shell{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px 18px;
}
.auth-card{
  width:100%; max-width:390px; background:var(--paper-raised); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow); padding:24px;
}
.auth-card h2{font-size:22px; margin-bottom:5px;}
.auth-card p{margin:0 0 18px; color:var(--muted); font-size:13px; line-height:1.45;}
.auth-tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px;}
.auth-tab{
  background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; padding:8px 2px;
  margin-right:14px; position:relative;
}
.auth-tab.active{color:var(--ink);}
.auth-tab.active::after{
  content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--copper);
}
.auth-form{display:none;}
.auth-form.active{display:block;}
.auth-field{display:flex; flex-direction:column; gap:5px; margin-bottom:11px;}
.auth-field label{font-size:11px; color:var(--muted);}
.auth-field input{
  padding:10px 11px; border:1px solid var(--line); border-radius:7px; font-size:13.5px;
  background:var(--paper-raised); color:var(--ink);
}
.auth-actions{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
.oauth-row{display:flex; gap:8px; margin-top:14px;}
.oauth-row .btn-ghost{flex:1;}
.auth-note{font-size:12px; color:var(--muted); margin-top:12px;}
.topbar-actions{display:flex; align-items:center; gap:8px;}
.user-chip{
  max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted);
}
.note-input{
  width:100%; min-height:42px; resize:vertical; margin-top:7px; padding:8px 9px;
  border:1px solid var(--grid-line); border-radius:6px; font-size:12.5px; color:var(--ink);
  background:var(--paper);
}

@media (max-width:480px){
  .brand h1{font-size:17px;}
  .section-title{display:none;}
  .hero-num{font-size:40px;}
  .mock-stats{flex-wrap:wrap;}
  .stat-card{min-width:calc(50% - 5px);}
  .topbar{align-items:flex-start;}
  .topbar-actions{flex-direction:column; align-items:flex-end;}
  .user-chip{max-width:115px;}
}
</style>
</head>
<body>

<div id="loadingScreen">loading tracker…</div>

<section class="auth-shell" id="authShell" hidden>
  <div class="auth-card">
    <h2 id="authTitle">Welcome back</h2>
    <p id="authSubtitle">Sign in to keep your GATE ECE tracker private and synced.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" data-auth-panel="login" type="button">Login</button>
      <button class="auth-tab" data-auth-panel="register" type="button">Register</button>
      <button class="auth-tab" data-auth-panel="forgot" type="button">Forgot</button>
    </div>

    <form class="auth-form active" id="loginForm">
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <div class="auth-actions">
        <button type="submit" class="btn-primary">Login</button>
      </div>
    </form>

    <form class="auth-form" id="registerForm">
      <div class="auth-field">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="auth-actions">
        <button type="submit" class="btn-primary">Create account</button>
      </div>
    </form>

    <form class="auth-form" id="forgotForm">
      <div class="auth-field">
        <label for="forgotEmail">Email</label>
        <input type="email" id="forgotEmail" autocomplete="email" required>
      </div>
      <div class="auth-actions">
        <button type="submit" class="btn-primary">Send reset link</button>
      </div>
    </form>

    <form class="auth-form" id="resetForm">
      <div class="auth-field">
        <label for="resetPassword">New password</label>
        <input type="password" id="resetPassword" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="auth-actions">
        <button type="submit" class="btn-primary">Update password</button>
      </div>
    </form>

    <div class="oauth-row">
      <button class="btn-ghost" id="googleLoginBtn" type="button">Google</button>
      <button class="btn-ghost" id="githubLoginBtn" type="button">GitHub</button>
    </div>
    <div class="auth-note" id="authMessage"></div>
  </div>
</section>

<div class="app" id="appShell" hidden>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">EC</span>
      <div>
        <h1>GATE ECE</h1>
        <p class="tagline">Syllabus · PYQs · Mock Tests</p>
      </div>
    </div>
    <div class="topbar-actions">
    <div class="countdown-wrap" id="countdownWrap">
      <button class="countdown" id="countdownChip" type="button" title="Click to set your exam date">
        <span class="countdown-num" id="countdownNum">—</span>
        <span class="countdown-unit">days to GATE</span>
      </button>
      <input type="date" class="countdown-input" id="examDateInput">
    </div>
      <span class="user-chip" id="userEmail"></span>
      <button class="footer-btn" id="logoutBtn" type="button">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="syllabus" type="button">Syllabus</button>
    <button class="tab" data-tab="pyq" type="button">PYQs</button>
    <button class="tab" data-tab="mocks" type="button">Mock Tests</button>
  </nav>

  <main>
    <!-- SYLLABUS -->
    <section class="panel active" id="tab-syllabus">
      <div class="hero">
        <div class="hero-num"><span id="heroPercent">0</span><span class="unit">%</span></div>
        <div class="hero-meta">
          <div class="hero-stat"><strong id="heroDone">0</strong>&nbsp;of <span id="heroTotal">0</span> topics done</div>
          <div class="trace-bar" id="traceBar"></div>
        </div>
      </div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search topics — e.g. Smith chart, Nyquist, MOSFET…">
      </div>
      <div class="sections" id="sectionsList"></div>
    </section>

    <!-- PYQ -->
    <section class="panel" id="tab-pyq">
      <div class="hero">
        <div class="hero-num"><span id="pyqPercent">0</span><span class="unit">%</span></div>
        <div class="hero-meta">
          <div class="hero-stat"><strong id="pyqSolved">0</strong>&nbsp;of <span id="pyqTotal">0</span> PYQs solved</div>
        </div>
      </div>
      <div class="pyq-list" id="pyqList"></div>
    </section>

    <!-- MOCK TESTS -->
    <section class="panel" id="tab-mocks">
      <div class="mock-stats" id="mockStats">
        <div class="stat-card"><div class="v" id="statTotal">0</div><div class="l">Tests taken</div></div>
        <div class="stat-card"><div class="v" id="statAvg">—</div><div class="l">Average score</div></div>
        <div class="stat-card"><div class="v" id="statBest">—</div><div class="l">Best score</div></div>
      </div>
      <div class="scope-wrap">
        <svg id="scopeChart" viewBox="0 0 600 180" preserveAspectRatio="none"></svg>
      </div>
      <button class="add-mock-btn" id="addMockBtn" type="button">+ Add mock test</button>
      <form class="mock-form" id="mockForm" hidden>
        <div class="row">
          <div class="field">
            <label for="mockTitle">Test title</label>
            <input type="text" id="mockTitle" placeholder="e.g. Made Easy FLT 3" required>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="mockDate">Date</label>
            <input type="date" id="mockDate" required>
          </div>
          <div class="field">
            <label for="mockScore">Score (/100)</label>
            <input type="number" id="mockScore" min="0" max="100" step="0.01" required>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="mockRemarks">Remarks (optional)</label>
            <textarea id="mockRemarks" placeholder="Weak in EMFT, silly mistakes in Networks…"></textarea>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="btn-primary">Save test</button>
          <button type="button" class="btn-ghost" id="cancelMockBtn">Cancel</button>
        </div>
      </form>

<script src="supabase-config.js"></script>
<script type="module">

const supabaseConfig = window.SUPABASE_CONFIG || {};

let currentSession = null;

// ---------------- Data ----------------
const DATA = [

DATA.forEach(sec => sec.topics.forEach((t,i) => t.id = sec.id + '-' + i));
const ALL_TOPICS = DATA.flatMap(s => s.topics.map(t => ({...t, sectionId:s.id})));

// ---------------- State ----------------
const DEFAULT_EXAM_DATE = '2027-02-01';
let state = { checklist:{}, notes:{}, pyq:{}, mocks:[], examDate:DEFAULT_EXAM_DATE };
let expandedSections = new Set();
let searchQuery = '';

async function loadState(){
  if(!supabase || !currentSession) return;
  const [progressRes, notesRes, pyqRes, mocksRes, settingsRes] = await Promise.all([
    supabase.from('user_progress').select('chapter_id, completed').order('chapter_id'),
    supabase.from('user_notes').select('chapter_id, note').order('chapter_id'),
    supabase.from('user_pyq_progress').select('subject_id, solved, total').order('subject_id'),
    supabase.from('mock_tests').select('id, title, test_date, score, remarks').order('test_date', { ascending:false }),
    supabase.from('user_settings').select('exam_date').maybeSingle(),
  ]);

  const firstError = [progressRes, notesRes, pyqRes, mocksRes, settingsRes].find(r => r.error)?.error;
  if(firstError) throw firstError;

  state = { checklist:{}, notes:{}, pyq:{}, mocks:[], examDate:DEFAULT_EXAM_DATE };
  progressRes.data?.forEach(row => { state.checklist[row.chapter_id] = Boolean(row.completed); });
  notesRes.data?.forEach(row => { state.notes[row.chapter_id] = row.note || ''; });
  pyqRes.data?.forEach(row => {
    state.pyq[row.subject_id] = { solved:Number(row.solved)||0, total:Number(row.total)||0 };
  });
  state.mocks = (mocksRes.data || []).map(row => ({
    id:row.id, title:row.title, date:row.test_date, score:Number(row.score), remarks:row.remarks || '',
  }));
  if(settingsRes.data?.exam_date) state.examDate = settingsRes.data.exam_date;
}

const saveTimers = new Map();
function debounceSave(key, fn){
  clearTimeout(saveTimers.get(key));
  saveTimers.set(key, setTimeout(fn, 250));
}

async function saveProgress(chapterId, completed){
  if(!supabase) return;
  try{
    const { error } = await supabase.from('user_progress').upsert({
      chapter_id:chapterId,
      completed:Boolean(completed),
      completion_date:completed ? new Date().toISOString().slice(0,10) : null,
    }, { onConflict:'user_id,chapter_id' });
    if(error) throw error;
  }catch(e){ console.error('progress save failed', e); showToast('Could not save progress'); }
}

function saveNote(chapterId, note){
  debounceSave('note:' + chapterId, async () => {
    if(!supabase) return;
    try{
      const { error } = await supabase.from('user_notes').upsert({
        chapter_id:chapterId,
        note:note.slice(0, 5000),
      }, { onConflict:'user_id,chapter_id' });
      if(error) throw error;
    }catch(e){ console.error('note save failed', e); showToast('Could not save note'); }
  });
}

function savePyq(subjectId){
  debounceSave('pyq:' + subjectId, async () => {
    if(!supabase) return;
    const rec = state.pyq[subjectId] || { solved:0, total:0 };
    const solved = Math.max(0, Number(rec.solved)||0);
    const total = Math.max(solved, Math.max(0, Number(rec.total)||0));
    try{
      const { error } = await supabase.from('user_pyq_progress').upsert({
        subject_id:subjectId,
        solved,
        total,
      }, { onConflict:'user_id,subject_id' });
      if(error) throw error;
    }catch(e){ console.error('pyq save failed', e); showToast('Could not save PYQs'); }
  });
}

function saveSettings(){
  debounceSave('settings', async () => {
    if(!supabase) return;
    try{
      const { error } = await supabase.from('user_settings').upsert({
        exam_date:state.examDate,
      }, { onConflict:'user_id' });
      if(error) throw error;
    }catch(e){ console.error('settings save failed', e); showToast('Could not save settings'); }
  });
}

async function addMockTest(test){
  if(!supabase) return;
  const { data, error } = await supabase.from('mock_tests').insert({
    title:test.title,
    test_date:test.date,
    score:test.score,
    remarks:test.remarks,
  }).select('id').single();
  if(error) throw error;
  test.id = data.id;
}

async function deleteMockTest(id){
  if(!supabase) return;
  const { error } = await supabase.from('mock_tests').delete().eq('id', id);
  if(error) throw error;
}

async function importStateToSupabase(nextState){
  if(!supabase) return;
  const progressRows = Object.entries(nextState.checklist || {}).map(([chapter_id, completed]) => ({
    chapter_id, completed:Boolean(completed), completion_date:completed ? new Date().toISOString().slice(0,10) : null,
  }));
  const noteRows = Object.entries(nextState.notes || {}).filter(([, note]) => String(note || '').trim()).map(([chapter_id, note]) => ({
    chapter_id, note:String(note).slice(0, 5000),
  }));
  const pyqRows = Object.entries(nextState.pyq || {}).map(([subject_id, rec]) => ({
    subject_id,
    solved:Math.max(0, Number(rec.solved)||0),
    total:Math.max(Math.max(0, Number(rec.solved)||0), Math.max(0, Number(rec.total)||0)),
  }));
  const mockRows = (nextState.mocks || []).map(t => ({
    title:String(t.title || '').slice(0, 160),
    test_date:t.date,
    score:Math.max(0, Math.min(100, Number(t.score)||0)),
    remarks:String(t.remarks || '').slice(0, 2000),
  })).filter(t => t.title && t.test_date);

  if(progressRows.length) await supabase.from('user_progress').upsert(progressRows, { onConflict:'user_id,chapter_id' }).throwOnError();
  if(noteRows.length) await supabase.from('user_notes').upsert(noteRows, { onConflict:'user_id,chapter_id' }).throwOnError();
  if(pyqRows.length) await supabase.from('user_pyq_progress').upsert(pyqRows, { onConflict:'user_id,subject_id' }).throwOnError();
  if(mockRows.length) await supabase.from('mock_tests').insert(mockRows).throwOnError();
  await supabase.from('user_settings').upsert({ exam_date:nextState.examDate || DEFAULT_EXAM_DATE }, { onConflict:'user_id' }).throwOnError();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, q){
  if(!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0,idx)) + '<mark>' + escapeHtml(text.slice(idx,idx+q.length)) + '</mark>' + escapeHtml(text.slice(idx+q.length));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---------------- Render: Syllabus ----------------
function sectionDone(sec){ return sec.topics.filter(t => state.checklist[t.id]).length; }

function renderHero(){
  const done = ALL_TOPICS.filter(t => state.checklist[t.id]).length;
  const total = ALL_TOPICS.length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('heroPercent').textContent = pct;
  document.getElementById('heroDone').textContent = done;
  document.getElementById('heroTotal').textContent = total;

  const bar = document.getElementById('traceBar');
  bar.innerHTML = DATA.map(sec => {
    const p = Math.round((sectionDone(sec)/sec.topics.length)*100);
    return `<div class="trace-seg" title="${escapeHtml(sec.title)} — ${p}%"><div class="trace-fill" style="width:${p}%"></div></div>`;
  }).join('');
}

function renderSections(){
  const q = searchQuery.trim().toLowerCase();
  const container = document.getElementById('sectionsList');
  let anyMatch = false;

  const html = DATA.map((sec, si) => {
    const matchedTopics = sec.topics.filter(t => !q || (t.n+' '+t.d).toLowerCase().includes(q));
    if(q && matchedTopics.length === 0) return '';
    anyMatch = true;
    const done = sectionDone(sec);
    const expanded = q ? true : expandedSections.has(sec.id);
    const pads = sec.topics.map(t => `<span class="pad ${state.checklist[t.id] ? 'done' : ''}"></span>`).join('');
    const topicsHtml = matchedTopics.map(t => `
      <div class="topic-row">
        <input type="checkbox" class="topic-check" data-topic="${t.id}" ${state.checklist[t.id] ? 'checked' : ''}>
        <span class="topic-text">
          <strong>${highlight(t.n, q)}</strong>
          ${t.d ? `<small>${highlight(t.d, q)}</small>` : ''}
          <textarea class="note-input" data-note="${t.id}" placeholder="Private note">${escapeHtml(state.notes[t.id] || '')}</textarea>
        </span>
      </div>`).join('');
    return `
      <div class="section-card ${expanded ? 'expanded' : ''}" data-section="${sec.id}">
        <button class="section-head" type="button" data-toggle="${sec.id}">
          <span class="section-num">${String(si+1).padStart(2,'0')}</span>
          <span class="section-title">${escapeHtml(sec.title)}</span>
          <span class="pad-row">${pads}</span>
          <span class="section-pct">${done}/${sec.topics.length}</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="section-body">
          <div class="section-body-inner">
            <div class="topics">${topicsHtml}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = anyMatch ? html : `<div class="no-match">No topics match "${escapeHtml(searchQuery)}".</div>`;
}

// ---------------- Render: PYQ ----------------
function renderPyq(){
  let solvedSum = 0, totalSum = 0;
  const html = DATA.map(sec => {
    const rec = state.pyq[sec.id] || { solved:0, total:0 };
    solvedSum += Number(rec.solved)||0;
    totalSum += Number(rec.total)||0;
    const pct = rec.total ? Math.round((rec.solved/rec.total)*100) : 0;
    return `
      <div class="pyq-row">
        <div class="pyq-row-head"><span class="t">${escapeHtml(sec.title)}</span><span class="p">${pct}%</span></div>
        <div class="pyq-inputs">
          <label>Solved<input type="number" min="0" class="mono" data-pyq-solved="${sec.id}" value="${rec.solved||0}"></label>
          <label>Total<input type="number" min="0" class="mono" data-pyq-total="${sec.id}" value="${rec.total||0}"></label>
        </div>
        <div class="pyq-bar"><div class="pyq-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
  document.getElementById('pyqList').innerHTML = html;

  const overallPct = totalSum ? Math.round((solvedSum/totalSum)*100) : 0;
  document.getElementById('pyqPercent').textContent = overallPct;
  document.getElementById('pyqSolved').textContent = solvedSum;
  document.getElementById('pyqTotal').textContent = totalSum;
}

// ---------------- Render: Mock tests ----------------
function renderMocks(){
  const tests = state.mocks;
  const total = tests.length;
  const avg = total ? (tests.reduce((a,t)=>a+Number(t.score),0)/total) : null;
  const best = total ? Math.max(...tests.map(t=>Number(t.score))) : null;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvg').textContent = avg === null ? '—' : avg.toFixed(1);
  document.getElementById('statBest').textContent = best === null ? '—' : best;

  const sortedDesc = [...tests].sort((a,b)=> b.date.localeCompare(a.date) || (b.id > a.id ? 1 : -1));
  document.getElementById('mockList').innerHTML = total ? sortedDesc.map(t => `
    <div class="mock-item">
      <div class="mock-score ${Number(t.score) < 50 ? 'low' : ''}">${t.score}</div>
      <div class="mock-body">
        <div class="mock-title">${escapeHtml(t.title)}</div>
        <div class="mock-date mono">${escapeHtml(t.date)}</div>
        ${t.remarks ? `<div class="mock-remarks">${escapeHtml(t.remarks)}</div>` : ''}
      </div>
      <button class="mock-del" data-del="${t.id}" title="Delete">×</button>
    </div>`).join('') : `<div class="mock-empty">No mock tests logged yet.</div>`;

  renderScope();
}

function renderScope(){
  const svg = document.getElementById('scopeChart');
  const tests = [...state.mocks].sort((a,b)=> a.date.localeCompare(b.date));
  if(tests.length === 0){
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" class="scope-empty">no signal yet — add your first mock test</text>`;
    return;
  }
  const W=600, H=180, padL=32, padR=14, padT=14, padB=10;
  const innerW = W-padL-padR, innerH = H-padT-padB;
  const n = tests.length;
  const points = tests.map((t,i) => {
    const x = padL + (n>1 ? (i*innerW/(n-1)) : innerW/2);
    const y = padT + innerH - (Math.max(0,Math.min(100,Number(t.score)))/100)*innerH;
    return {x,y,t};
  });
  let grid = '';
  [0,25,50,75,100].forEach(v => {
    const y = padT + innerH - (v/100)*innerH;
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" class="scope-grid-line"/>
      <text x="${padL-6}" y="${y+3}" class="scope-axis-label" text-anchor="end">${v}</text>`;
  });
  const poly = points.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dots = points.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" class="scope-dot"><title>${escapeHtml(p.t.date)} · ${p.t.score}/100 · ${escapeHtml(p.t.title)}</title></circle>`).join('');
  svg.innerHTML = `
    <defs><filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
    ${grid}
    <polyline points="${poly}" class="scope-line" filter="url(#glow)"/>
    ${dots}`;
}

// ---------------- Countdown ----------------
function renderCountdown(){
  const today = new Date(); today.setHours(0,0,0,0);
  const exam = new Date(state.examDate + 'T00:00:00');
  const diff = Math.round((exam - today) / 86400000);
  document.getElementById('countdownNum').textContent = diff >= 0 ? diff : '0';
  document.querySelector('.countdown-unit').textContent = diff >= 0 ? 'days to GATE' : 'exam day passed';
}

// ---------------- Render all ----------------
function renderAll(){
  renderHero();
  renderSections();
  renderPyq();
  renderMocks();
  renderCountdown();
}

// ---------------- Events ----------------
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('sectionsList').addEventListener('click', e => {
  const head = e.target.closest('[data-toggle]');
  if(head){
    const id = head.dataset.toggle;
    expandedSections.has(id) ? expandedSections.delete(id) : expandedSections.add(id);
    renderSections();
  }
});
document.getElementById('sectionsList').addEventListener('change', e => {
  if(e.target.matches('input[data-topic]')){
    state.checklist[e.target.dataset.topic] = e.target.checked;
    saveProgress(e.target.dataset.topic, e.target.checked);
    renderHero();
    renderSections();
  }
});
document.getElementById('sectionsList').addEventListener('input', e => {
  if(e.target.matches('textarea[data-note]')){
    state.notes[e.target.dataset.note] = e.target.value;
    saveNote(e.target.dataset.note, e.target.value);
  }
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderSections();
});

document.getElementById('pyqList').addEventListener('input', e => {
  const solvedId = e.target.dataset.pyqSolved, totalId = e.target.dataset.pyqTotal;
  const sid = solvedId || totalId;
  if(!sid) return;
  if(!state.pyq[sid]) state.pyq[sid] = { solved:0, total:0 };
  if(solvedId) state.pyq[sid].solved = Math.max(0, Number(e.target.value)||0);
  if(totalId) state.pyq[sid].total = Math.max(0, Number(e.target.value)||0);
  savePyq(sid);
  renderPyq();
});

const mockForm = document.getElementById('mockForm');
const addMockBtn = document.getElementById('addMockBtn');
addMockBtn.addEventListener('click', () => {
  mockForm.hidden = false;
  addMockBtn.hidden = true;
  document.getElementById('mockDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('mockTitle').focus();
});
document.getElementById('cancelMockBtn').addEventListener('click', () => {
  mockForm.reset();
  mockForm.hidden = true;
  addMockBtn.hidden = false;
});
mockForm.addEventListener('submit', async e => {
  e.preventDefault();
  const title = document.getElementById('mockTitle').value.trim();
  const date = document.getElementById('mockDate').value;
  const score = Number(document.getElementById('mockScore').value);
  const remarks = document.getElementById('mockRemarks').value.trim();
  if(!title || !date || Number.isNaN(score)) return;
  const test = { id:'pending-' + Date.now(), title:title.slice(0,160), date, score:Math.max(0, Math.min(100, score)), remarks:remarks.slice(0,2000) };
  state.mocks.push(test);
  renderMocks();
  try{
    await addMockTest(test);
    mockForm.reset();
    mockForm.hidden = true;
    addMockBtn.hidden = false;
    renderMocks();
    showToast('Mock test saved');
  }catch(err){
    state.mocks = state.mocks.filter(t => t.id !== test.id);
    renderMocks();
    showToast('Could not save mock test');
  }
});
document.getElementById('mockList').addEventListener('click', async e => {
  const btn = e.target.closest('[data-del]');
  if(btn){
    const oldMocks = [...state.mocks];
    state.mocks = state.mocks.filter(t => t.id !== btn.dataset.del);
    renderMocks();
    try{
      await deleteMockTest(btn.dataset.del);
    }catch(err){
      state.mocks = oldMocks;
      renderMocks();
      showToast('Could not delete mock test');
    }
  }
});

const countdownWrap = document.getElementById('countdownWrap');
const countdownChip = document.getElementById('countdownChip');
const examDateInput = document.getElementById('examDateInput');
countdownChip.addEventListener('click', () => {
  examDateInput.value = state.examDate;
  countdownWrap.classList.add('editing');
  examDateInput.focus();
});
examDateInput.addEventListener('change', () => {
  if(examDateInput.value){ state.examDate = examDateInput.value; saveSettings(); }
  countdownWrap.classList.remove('editing');
  renderCountdown();
});
examDateInput.addEventListener('blur', () => {
  countdownWrap.classList.remove('editing');
  renderCountdown();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'gate-ece-tracker-backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exported');
});
document.getElementById('importInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const parsed = JSON.parse(reader.result);
      state = Object.assign({ checklist:{}, notes:{}, pyq:{}, mocks:[], examDate:DEFAULT_EXAM_DATE }, parsed);
      await importStateToSupabase(state);
      await loadState();
      renderAll();
      showToast('Backup imported');
    }catch(err){ showToast('Could not read that file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ---------------- Auth ----------------
function setAuthMessage(msg){
  document.getElementById('authMessage').textContent = msg || '';
}

function showAuthPanel(panel){
  document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.authPanel === panel));
  document.querySelectorAll('.auth-form').forEach(form => form.classList.toggle('active', form.id === panel + 'Form'));
  const copy = {
    login:['Welcome back', 'Sign in to keep your GATE ECE tracker private and synced.'],
    register:['Create account', 'Use email/password or continue with Google/GitHub.'],
    forgot:['Reset password', 'Enter your email and Supabase will send a reset link.'],
    reset:['Set new password', 'Choose a new password to finish account recovery.'],
  }[panel];
  document.getElementById('authTitle').textContent = copy[0];
  document.getElementById('authSubtitle').textContent = copy[1];
  setAuthMessage('');
}

async function showSignedIn(session){
  currentSession = session;
  document.getElementById('authShell').hidden = true;
  document.getElementById('appShell').hidden = false;
  document.getElementById('userEmail').textContent = session.user.email || 'Signed in';
  try{
    await loadState();
    renderAll();
  }catch(err){
    console.error('load failed', err);
    showToast('Could not load your tracker');
  }
}

function showSignedOut(){
  currentSession = null;
  state = { checklist:{}, notes:{}, pyq:{}, mocks:[], examDate:DEFAULT_EXAM_DATE };
  document.getElementById('appShell').hidden = true;
  document.getElementById('authShell').hidden = false;
}

document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => showAuthPanel(tab.dataset.authPanel));
});

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  setAuthMessage('Signing in...');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  setAuthMessage(error ? error.message : '');
});

document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  setAuthMessage('Creating account...');
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value;
  const { error } = await supabase.auth.signUp({
    email,
    password,
    options:{ emailRedirectTo:window.location.origin },
  });
  setAuthMessage(error ? error.message : 'Check your email to verify your account.');
});

document.getElementById('forgotForm').addEventListener('submit', async e => {
  e.preventDefault();
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  setAuthMessage('Sending reset link...');
  const email = document.getElementById('forgotEmail').value.trim();
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo:window.location.origin });
  setAuthMessage(error ? error.message : 'Password reset email sent.');
});

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  setAuthMessage('Updating password...');
  const password = document.getElementById('resetPassword').value;
  const { error } = await supabase.auth.updateUser({ password });
  if(error){
    setAuthMessage(error.message);
    return;
  }
  setAuthMessage('');
  const { data } = await supabase.auth.getSession();
  if(data.session) await showSignedIn(data.session);
});

document.getElementById('googleLoginBtn').addEventListener('click', async () => {
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  await supabase.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:window.location.origin } });
});

document.getElementById('githubLoginBtn').addEventListener('click', async () => {
  if(!supabase){ setAuthMessage('Supabase is not configured yet.'); return; }
  await supabase.auth.signInWithOAuth({ provider:'github', options:{ redirectTo:window.location.origin } });
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  if(!supabase) return;
  await supabase.auth.signOut();
});

// ---------------- Init ----------------
(function init(){
  if(!hasSupabaseConfig){
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('authShell').hidden = false;
    setAuthMessage('Supabase is not configured yet. Add supabase-config.js from the example file.');
    return;
  }
  let loadingHidden = false;
  function hideLoadingOnce(){
    if(loadingHidden) return;
    loadingHidden = true;
    document.getElementById('loadingScreen').style.display = 'none';
  }
  supabase.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY'){
      currentSession = session;
      document.getElementById('appShell').hidden = true;
      document.getElementById('authShell').hidden = false;
      showAuthPanel('reset');
      hideLoadingOnce();
      return;
    }
    if(session) showSignedIn(session);
    else showSignedOut();
    hideLoadingOnce();
  });
})();
</script>
